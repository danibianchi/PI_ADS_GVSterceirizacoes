<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVS Terceirizações - Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons para ícones -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        if(localStorage.getItem('gvs_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Menu -->
        <aside class="sidebar">
            <div class="sidebar-header" style="background: white; display: flex; justify-content: center; padding: 20px;">
                <a href="index.html" class="logo" style="display: block; cursor: pointer;">
                    <img src="logo.png" alt="Logo GVS" style="max-width: 140px;">
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-target="dashboard">
                    <i class='bx bx-grid-alt'></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-target="clientes">
                    <i class='bx bx-user-circle'></i>
                    <span>Clientes</span>
                </a>
                <a href="#" class="nav-item" data-target="prestadores">
                    <i class='bx bx-briefcase-alt-2'></i>
                    <span>Prestadores</span>
                </a>
                <a href="#" class="nav-item" data-target="contratos">
                    <i class='bx bx-file'></i>
                    <span>Contratos</span>
                </a>
                <a href="#" class="nav-item" data-target="ordens">
                    <i class='bx bx-task'></i>
                    <span>Ordens de Serviço</span>
                </a>
                <a href="#" class="nav-item" data-target="historico">
                    <i class='bx bx-history'></i>
                    <span>Auditoria</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-item" data-target="usuarios" style="margin-bottom: 20px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2);">
                    <i class='bx bx-group'></i>
                    <span>Usuários do Sistema</span>
                </a>
                <div class="user-info" id="user-menu-btn" style="cursor: pointer; position: relative;" onclick="document.getElementById('user-dropdown').classList.toggle('active')">
                    <img src="https://ui-avatars.com/api/?name=Admin+GVS&background=3b82f6&color=fff" alt="User" class="avatar">
                    <div class="user-details">
                        <span class="user-name">Administrador</span>
                        <span class="user-role">GVS Terceirizações</span>
                    </div>
                    <i class='bx bx-chevron-up' style="margin-left: auto; color: var(--text-secondary);"></i>
                    
                    <!-- Dropdown de Perfil -->
                    <div class="user-dropdown" id="user-dropdown">
                        <a href="#" onclick="toggleTheme()" id="theme-toggle-btn"><i class='bx bx-sun'></i> Modo Claro</a>
                        <a href="#" onclick="openConfigModal()"><i class='bx bx-cog'></i> Alterar Senha</a>
                        <a href="#" onclick="logout()"><i class='bx bx-log-out'></i> Sair</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="mobile-menu-btn" class="btn-icon" style="display: none;"><i class='bx bx-menu' style="font-size: 24px;"></i></button>
                    <button class="btn-icon" title="Voltar" onclick="goBack()"><i class='bx bx-arrow-back'></i></button>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-actions" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <div class="search-container" id="search-container" style="display: none; align-items: center; gap: 10px; position: relative;">
                        <i class='bx bx-search' style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                        <input type="text" id="search-input" class="form-control" placeholder="Pesquisar..." style="padding-left: 35px; width: 200px; background: rgba(0,0,0,0.3);" oninput="applyFilters()">
                        <select id="status-filter" class="form-control" style="width: auto; background: rgba(0,0,0,0.3);" onchange="applyFilters()">
                            <option value="todos">Todos os Status</option>
                            <option value="ativo">Ativos / Disponíveis</option>
                            <option value="inativo">Inativos / Indisponíveis</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="btn-novo" style="display: none;">
                        <i class='bx bx-plus'></i> Novo Registro
                    </button>
                    <button class="btn" id="btn-export" style="display: none; background: #28a745; color: white;" onclick="exportToCSV()" title="Exportar para Excel (CSV)">
                        <i class='bx bx-download'></i> Exportar
                    </button>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- O conteúdo dinâmico será injetado aqui -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Exemplo base) -->
    <div class="modal-overlay" id="modal-base">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 id="modal-title">Novo Registro</h2>
                <button class="close-modal"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body" id="modal-form-container">
                <!-- Formulário injetado via JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
