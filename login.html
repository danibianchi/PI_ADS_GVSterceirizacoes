<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GVS Terceirizações</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.2), #0b1121 50%);
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: #ffffff; /* Modal todo branco */
            color: #1e293b; /* Texto escuro */
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .login-card img {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .login-card label {
            color: #475569;
            font-weight: 500;
        }
        .login-card input.form-control {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }
        .login-card input.form-control:focus {
            border-color: #3b82f6;
            background: #ffffff;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .password-reqs {
            font-size: 11px;
            color: #64748b;
            text-align: left;
            margin-top: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.png" alt="GVS Logo" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
        
        <!-- Formulário de Login -->
        <div id="login-section">
            <h2 style="margin-bottom: 20px; color: #0f172a;">Acesso ao Sistema</h2>
            <p class="error-msg" id="error-msg">Usuário ou senha incorretos.</p>
            
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label>Usuário</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="form-group" style="text-align: left; margin-bottom: 5px;">
                    <label>Senha</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 15px;">
                    Entrar <i class='bx bx-log-in'></i>
                </button>
            </form>
        </div>

        <!-- Formulário de Troca de Senha Forçada -->
        <div id="force-change-section" style="display: none;">
            <h3 style="color: #0f172a; margin-bottom: 5px;">Atualização Obrigatória</h3>
            <p style="font-size: 13px; color: #475569; margin-bottom: 20px;">
                Você está usando a senha padrão. Por segurança, crie uma nova senha agora.
            </p>
            
            <form id="change-pass-form">
                <div class="form-group" style="text-align: left; margin-bottom: 5px;">
                    <label>Nova Senha Segura</label>
                    <input type="password" id="new-password" class="form-control" required 
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"
                           title="A senha deve ter no mínimo 8 caracteres, uma letra maiúscula, uma minúscula, um número e um caractere especial">
                </div>
                <div class="password-reqs">
                    Requisitos: Mín. 8 caracteres, 1 Maiúscula, 1 Número, 1 Caractere Especial (!@#$)
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; background: #10b981; border-color: #10b981;">
                    Salvar e Acessar <i class='bx bx-check-shield'></i>
                </button>
            </form>
        </div>

    </div>

    <script>
        // Senha salva no localStorage, ou a padrão Admin@123
        const currentValidPass = localStorage.getItem('gvs_custom_pass') || 'Admin@123';

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === 'admin' && pass === currentValidPass) {
                // Se ainda for a senha padrão, força a troca
                if(pass === 'Admin@123') {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('force-change-section').style.display = 'block';
                } else {
                    localStorage.setItem('gvs_auth', 'true');
                    window.location.href = 'index.html';
                }
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        document.getElementById('change-pass-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            
            if(newPass === 'Admin@123') {
                alert('A nova senha não pode ser igual à senha inicial padrão.');
                return;
            }
            
            // Salva a nova senha e libera o acesso
            localStorage.setItem('gvs_custom_pass', newPass);
            localStorage.setItem('gvs_auth', 'true');
            window.location.href = 'index.html';
        });

        // Se já estiver logado, vai pro index
        if(localStorage.getItem('gvs_auth') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
